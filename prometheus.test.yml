global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # API Gateway
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway-test:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Auth Service
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service-test:3001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Memories Service
  - job_name: 'memories-service'
    static_configs:
      - targets: ['memories-service-test:3002']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Media Service
  - job_name: 'media-service'
    static_configs:
      - targets: ['media-service-test:3003']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Notifications Service
  - job_name: 'notifications-service'
    static_configs:
      - targets: ['notifications-service-test:3004']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Payments Service
  - job_name: 'payments-service'
    static_configs:
      - targets: ['payments-service-test:3005']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Analytics Service
  - job_name: 'analytics-service'
    static_configs:
      - targets: ['analytics-service-test:3006']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Health checks
  - job_name: 'health-checks'
    static_configs:
      - targets: 
        - 'api-gateway-test:3000'
        - 'auth-service-test:3001'
        - 'memories-service-test:3002'
        - 'media-service-test:3003'
        - 'notifications-service-test:3004'
        - 'payments-service-test:3005'
        - 'analytics-service-test:3006'
    metrics_path: '/health'
    scrape_interval: 30s
