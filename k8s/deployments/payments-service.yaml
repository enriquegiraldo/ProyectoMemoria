apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-service
  namespace: memoria-eterna
  labels:
    app: payments-service
    component: microservice
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payments-service
  template:
    metadata:
      labels:
        app: payments-service
        component: microservice
        tier: backend
    spec:
      containers:
        - name: payments-service
          image: memoria-eterna/payments-service:latest
          ports:
            - containerPort: 3006
              name: http
            - containerPort: 9090
              name: metrics
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3006"
            - name: METRICS_PORT
              value: "9090"
            # Database Configuration
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: PAYMENTS_DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_URL
            # Security Configuration
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ENCRYPTION_KEY
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: WEBHOOK_SECRET
            # Payment Providers Configuration
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: payment-secrets
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: payment-secrets
                  key: STRIPE_PUBLISHABLE_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: payment-secrets
                  key: STRIPE_WEBHOOK_SECRET
            - name: PAYPAL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: payment-secrets
                  key: PAYPAL_CLIENT_ID
            - name: PAYPAL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: payment-secrets
                  key: PAYPAL_CLIENT_SECRET
            - name: MERCADOPAGO_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: payment-secrets
                  key: MERCADOPAGO_ACCESS_TOKEN
            - name: MERCADOPAGO_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: payment-secrets
                  key: MERCADOPAGO_PUBLIC_KEY
            # Service Discovery
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:3001"
            - name: NOTIFICATIONS_SERVICE_URL
              value: "http://notifications-service:3004"
            - name: ANALYTICS_SERVICE_URL
              value: "http://analytics-service:3005"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: payments-config
              mountPath: /app/config
              readOnly: true
            - name: payments-logs
              mountPath: /app/logs
      volumes:
        - name: payments-config
          configMap:
            name: payments-service-config
        - name: payments-logs
          emptyDir: {}
---
# Payments Service Service
apiVersion: v1
kind: Service
metadata:
  name: payments-service
  namespace: memoria-eterna
  labels:
    app: payments-service
    component: microservice
    tier: backend
spec:
  selector:
    app: payments-service
  ports:
    - protocol: TCP
      port: 3006
      targetPort: 3006
      name: http
    - protocol: TCP
      port: 9090
      targetPort: 9090
      name: metrics
  type: ClusterIP
---
# Payments Service ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: payments-service-config
  namespace: memoria-eterna
data:
  config.ts: |
    export const config = {
      server: {
        port: 3006,
        environment: 'production',
        cors: {
          origin: ['https://memoriaeterna.com', 'https://www.memoriaeterna.com'],
          credentials: true
        }
      },
      database: {
        url: process.env.DATABASE_URL,
        ssl: true
      },
      redis: {
        url: process.env.REDIS_URL
      },
      jwt: {
        secret: process.env.JWT_SECRET,
        expiresIn: '24h'
      },
      stripe: {
        secretKey: process.env.STRIPE_SECRET_KEY,
        publishableKey: process.env.STRIPE_PUBLISHABLE_KEY,
        webhookSecret: process.env.STRIPE_WEBHOOK_SECRET,
        apiVersion: '2023-10-16'
      },
      paypal: {
        clientId: process.env.PAYPAL_CLIENT_ID,
        clientSecret: process.env.PAYPAL_CLIENT_SECRET,
        mode: 'live'
      },
      mercadopago: {
        accessToken: process.env.MERCADOPAGO_ACCESS_TOKEN,
        publicKey: process.env.MERCADOPAGO_PUBLIC_KEY
      },
      security: {
        encryptionKey: process.env.ENCRYPTION_KEY,
        webhookSecret: process.env.WEBHOOK_SECRET
      }
    };
---
# Payments Service Secrets
apiVersion: v1
kind: Secret
metadata:
  name: payment-secrets
  namespace: memoria-eterna
type: Opaque
data:
  # These should be base64 encoded in production
  STRIPE_SECRET_KEY: <base64-encoded-stripe-secret-key>
  STRIPE_PUBLISHABLE_KEY: <base64-encoded-stripe-publishable-key>
  STRIPE_WEBHOOK_SECRET: <base64-encoded-stripe-webhook-secret>
  PAYPAL_CLIENT_ID: <base64-encoded-paypal-client-id>
  PAYPAL_CLIENT_SECRET: <base64-encoded-paypal-client-secret>
  MERCADOPAGO_ACCESS_TOKEN: <base64-encoded-mercadopago-access-token>
  MERCADOPAGO_PUBLIC_KEY: <base64-encoded-mercadopago-public-key>
---
# Payments Service HPA (Horizontal Pod Autoscaler)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payments-service-hpa
  namespace: memoria-eterna
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payments-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 30
