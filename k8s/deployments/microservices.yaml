              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MULTI_TENANT_ENABLED
            - name: TENANT_ISOLATION_MODE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: TENANT_ISOLATION_MODE
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
