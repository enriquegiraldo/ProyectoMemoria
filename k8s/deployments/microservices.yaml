# Media Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  namespace: memoria-eterna
  labels:
    app: media-service
    component: microservice
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: media-service
  template:
    metadata:
      labels:
        app: media-service
        component: microservice
        tier: backend
    spec:
      containers:
        - name: media-service
          image: memoria-eterna/media-service:latest
          ports:
            - containerPort: 3003
              name: http
            - containerPort: 9090
              name: metrics
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3003"
            - name: METRICS_PORT
              value: "9090"
            # Cloudinary Configuration
            - name: CLOUDINARY_CLOUD_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CLOUDINARY_CLOUD_NAME
            - name: CLOUDINARY_API_KEY
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CLOUDINARY_API_KEY
            - name: CLOUDINARY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: CLOUDINARY_API_SECRET
            # Database Configuration
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_URL
            # Enterprise Configuration
            - name: MULTI_TENANT_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MULTI_TENANT_ENABLED
            - name: TENANT_ISOLATION_MODE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: TENANT_ISOLATION_MODE
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
