version: '3.8'

services:
  payments-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payments-service
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - PORT=3004
      - DATABASE_URL=postgresql://payments_user:payments_password@payments-db:5432/payments_db
      - REDIS_URL=redis://payments-redis:6379
      - JWT_SECRET=your-jwt-secret-key
      - ENCRYPTION_KEY=your-32-character-encryption-key
      - WEBHOOK_SECRET=your-webhook-secret
      - STRIPE_SECRET_KEY=sk_test_your_stripe_secret_key
      - STRIPE_PUBLISHABLE_KEY=pk_test_your_stripe_publishable_key
      - STRIPE_WEBHOOK_SECRET=whsec_your_stripe_webhook_secret
      - PAYPAL_CLIENT_ID=your_paypal_client_id
      - PAYPAL_CLIENT_SECRET=your_paypal_client_secret
      - MERCADOPAGO_ACCESS_TOKEN=your_mercadopago_access_token
      - MERCADOPAGO_PUBLIC_KEY=your_mercadopago_public_key
    depends_on:
      - payments-db
      - payments-redis
    networks:
      - payments-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  payments-db:
    image: postgres:15-alpine
    container_name: payments-db
    environment:
      - POSTGRES_DB=payments_db
      - POSTGRES_USER=payments_user
      - POSTGRES_PASSWORD=payments_password
    ports:
      - "5434:5432"
    volumes:
      - payments_db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - payments-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments_user -d payments_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  payments-redis:
    image: redis:7-alpine
    container_name: payments-redis
    ports:
      - "6380:6379"
    volumes:
      - payments_redis_data:/data
    networks:
      - payments-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  payments-metrics:
    image: prom/prometheus:latest
    container_name: payments-metrics
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - payments_metrics_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - payments-network
    restart: unless-stopped

volumes:
  payments_db_data:
  payments_redis_data:
  payments_metrics_data:

networks:
  payments-network:
    driver: bridge
