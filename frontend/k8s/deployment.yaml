apiVersion: apps/v1
kind: Deployment
metadata:
  name: memoria-eterna-frontend
  labels:
    app: memoria-eterna-frontend
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: memoria-eterna-frontend
  template:
    metadata:
      labels:
        app: memoria-eterna-frontend
        version: v1
    spec:
      containers:
      - name: frontend
        image: memoria-eterna/frontend:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.memoria-eterna.com"
        - name: NEXT_PUBLIC_APP_URL
          value: "https://memoria-eterna.com"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: memoria-eterna-frontend-service
  labels:
    app: memoria-eterna-frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: memoria-eterna-frontend
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: memoria-eterna-frontend-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - memoria-eterna.com
    - www.memoria-eterna.com
    secretName: memoria-eterna-tls
  rules:
  - host: memoria-eterna.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: memoria-eterna-frontend-service
            port:
              number: 80
  - host: www.memoria-eterna.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: memoria-eterna-frontend-service
            port:
              number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: memoria-eterna-frontend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: memoria-eterna-frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
